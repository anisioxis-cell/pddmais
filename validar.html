<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validação</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  transition: background 0.4s;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* FUNDOS */
body.inicial {
  background: #eef7ff;
}

body.ativo {
  background: #eafaf1;
}

body.inativo {
  background: #fdeeee;
}

/* CARD */
.card {
  width: 92%;
  max-width: 420px;
  background: white;
  border-radius: 22px;
  padding: 30px 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  text-align: center;
}

/* STATUS */
.status {
  font-size: 30px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* CORES */
.ok {
  color: #1e7e34;
}

.no {
  color: #c82333;
}

/* NOME */
.nome {
  font-size: 26px;
  margin: 15px 0;
}

/* TIPO */
.tipo {
  font-size: 20px;
  color: #555;
}

/* TEXTO */
.loading {
  font-size: 20px;
  color: #666;
}
</style>
</head>

<body class="inicial">

<div class="card">
  <div id="conteudo" class="loading">🔄 Verificando...</div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

fetch(`https://script.google.com/macros/s/AKfycbxXAUfFZn1HjwBC6qEwyBrh6pqzHwaG9Nb71x98qUa8X5ocJEyxa4zppjfZiCD-g6guHA/exec?id=${id}`)
.then(res => res.json())
.then(dados => {

  if (dados.erro) {
    document.body.className = "inativo";
    document.getElementById("conteudo").innerHTML =
      `<div class="status no">❌ NÃO ENCONTRADO</div>`;
    return;
  }

  if (dados.status === "ATIVO") {
    document.body.className = "ativo";

    document.getElementById("conteudo").innerHTML = `
      <div class="status ok">✔ DESCONTO LIBERADO</div>
      <div class="nome">${dados.nome}</div>
      <div class="tipo">${dados.tipo}</div>
    `;
  } else {
    document.body.className = "inativo";

    document.getElementById("conteudo").innerHTML = `
      <div class="status no">❌ NÃO AUTORIZADO</div>
      <div class="nome">${dados.nome}</div>
      <div class="tipo">${dados.tipo}</div>
    `;
  }

})
.catch(() => {
  document.body.className = "inativo";
  document.getElementById("conteudo").innerHTML =
    `<div class="status no">⚠️ ERRO</div>`;
});
</script>

</body>
</html>
