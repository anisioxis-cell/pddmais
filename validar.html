<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Validação</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
    }

    .container {
      padding: 30px 20px;
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
    }

    .nome {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .tipo {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .status {
      font-size: 22px;
      font-weight: bold;
      padding: 10px;
      border-radius: 10px;
      display: inline-block;
      background: rgba(255,255,255,0.2);
    }

    .erro {
      font-size: 24px;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<div class="container" id="app">
  <img src="https://link-da-sua-logo.png">

  <div class="nome" id="nome">Carregando...</div>
  <div class="tipo" id="tipo"></div>
  <div class="status" id="status"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const token = params.get("token");

  const urlAPI = "https://script.google.com/macros/s/AKfycbyAyks1E4bjB2sFLGFwb6b5w3uMuj7GAE0xgZGGtyhQvPiVq4_VULqsBjq93q9DgB2GAw/exec";

  fetch(urlAPI + "?id=" + id + "&token=" + token)
    .then(res => res.json())
    .then(data => {
      const body = document.body;

      if (data.erro) {
        document.getElementById("app").innerHTML = "<div class='erro'>❌ NÃO ENCONTRADO</div>";
        body.style.background = "#555";
        return;
      }

      document.getElementById("nome").innerText = data.nome;
      document.getElementById("tipo").innerText = data.tipo;

      if (data.status === "ATIVO") {
        document.getElementById("status").innerText = "✅ ATIVO";
      } else {
        document.getElementById("status").innerText = "❌ INATIVO";
      }

      // CORES POR TIPO
      if (id.startsWith("RES")) {
        body.style.background = "#2196F3"; // azul
      } else if (id.startsWith("COND")) {
        body.style.background = "#6A1B9A"; // roxo
      } else if (id.startsWith("COM")) {
        body.style.background = "#FB8C00"; // laranja
      } else if (id.startsWith("PRES")) {
        body.style.background = "#2E7D32"; // verde
      }
    });
</script>

</body>
</html>
