<!DOCTYPE html>
<html>
<head>
  <title>Validação</title>
</head>
<body>
  <h2>Verificando...</h2>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch(`https://script.google.com/macros/s/AKfycbximIf-OrRXsGQRKCna69_Bj9Jlhs0eeACypicE9j29DDKR82puSf-GbGleSuePV4e5ew/exec?id=${id}`)
  .then(res => res.json())
  .then(dados => {

    if (dados.erro) {
      document.body.innerHTML = "<h1 style='color:red'>❌ NÃO AUTORIZADO</h1>";
      return;
    }

    let cor = dados.status == "ATIVO" ? "green" : "red";
    let texto = dados.status == "ATIVO" ? "✅ AUTORIZADO" : "❌ BLOQUEADO";

    document.body.innerHTML = `
      <h1 style="color:${cor}">${texto}</h1>
      <p><b>Nome:</b> ${dados.nome}</p>
      <p><b>Tipo:</b> ${dados.tipo}</p>
      <p><b>Status:</b> ${dados.status}</p>
    `;
  })
  .catch(() => {
    document.body.innerHTML = "<h1>Erro ao consultar</h1>";
  });
</script>

</body>
</html>
