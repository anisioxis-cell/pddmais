<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Validador - PDD+</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
  <style>
    :root {
      --azul:    #003087;
      --verde:   #1a7a45;
      --vermelho:#b03030;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', Arial, sans-serif;
      background: #f0f6fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      background: var(--azul);
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 3px 16px rgba(0,48,135,0.22);
    }

    .logo-mini {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.7);
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 10px; font-weight: 900; color: var(--azul);
      line-height: 1;
      text-align: center;
    }

    .header-txt h1 {
      color: #fff;
      font-size: 16px;
      font-weight: 800;
    }

    .header-txt p {
      color: rgba(255,255,255,0.7);
      font-size: 11.5px;
      font-weight: 600;
    }

    /* ── TELA PRINCIPAL ── */
    .main {
      width: 100%;
      max-width: 420px;
      padding: 22px 18px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ── CARD RESULTADO ── */
    .resultado-card {
      width: 100%;
      border-radius: 22px;
      padding: 26px 22px 22px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      animation: popIn .4s cubic-bezier(.22,.68,0,1.2) both;
      transition: background .35s, border .35s;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(.93) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .resultado-card.aguardando {
      background: #fff;
      border: 2px solid #d0ddf0;
    }

    .resultado-card.liberado {
      background: #f0faf4;
      border: 2.5px solid #2db87a;
    }

    .resultado-card.negado {
      background: #fff3f3;
      border: 2.5px solid #e24b4a;
    }

    .icon-status {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 6px;
    }

    .icon-status.aguardando { background: #e8eef8; }
    .icon-status.liberado   { background: #d4f0e2; }
    .icon-status.negado     { background: #fde0e0; }

    .icon-status svg { width: 34px; height: 34px; }

    .status-titulo {
      font-size: 21px;
      font-weight: 900;
      letter-spacing: .5px;
    }

    .liberado .status-titulo { color: #0f6030; }
    .negado   .status-titulo { color: #9a1010; }
    .aguardando .status-titulo { color: #334; }

    .assoc-nome {
      font-size: 20px;
      font-weight: 800;
      color: #111;
      margin-top: 4px;
    }

    .assoc-meta {
      font-size: 13.5px;
      font-weight: 600;
      color: #555;
    }

    .assoc-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 800;
      margin-top: 6px;
    }

    .liberado .assoc-badge {
      background: #d4f0e2;
      color: #0f6030;
      border: 1px solid #9dd8b8;
    }

    .negado .assoc-badge {
      background: #fde0e0;
      color: #9a1010;
      border: 1px solid #f5b5b5;
    }

    .timestamp {
      font-size: 11px;
      color: #aaa;
      font-weight: 600;
      margin-top: 6px;
    }

    /* ── BTN QR ── */
    .btn-qr {
      width: 100%;
      max-width: 340px;
      padding: 17px;
      border-radius: 18px;
      background: var(--azul);
      color: #fff;
      font-size: 17px;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 6px 22px rgba(0,48,135,0.28);
      transition: background .18s, transform .1s;
    }

    .btn-qr:active { background: #001f5c; transform: scale(.98); }

    .btn-nova {
      width: 100%;
      max-width: 340px;
      padding: 13px;
      border-radius: 18px;
      background: transparent;
      color: var(--azul);
      font-size: 15px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      border: 2px solid var(--azul);
      cursor: pointer;
      transition: background .18s;
    }

    .btn-nova:active { background: #e0eeff; }

    /* ── SCANNER OVERLAY ── */
    .scanner-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      flex-direction: column;
      align-items: center;
    }

    .scanner-overlay.ativo { display: flex; }

    .scan-header {
      width: 100%;
      padding: 18px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.6);
    }

    .scan-header span {
      color: #fff;
      font-size: 15px;
      font-weight: 700;
    }

    .btn-fechar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    #video {
      width: 100%;
      flex: 1;
      object-fit: cover;
    }

    .scan-frame-wrap {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scan-frame {
      width: 220px; height: 220px;
      border: 3px solid #2db87a;
      border-radius: 14px;
      position: relative;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.42);
    }

    .scan-line {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: #2db87a;
      box-shadow: 0 0 8px #2db87a;
      border-radius: 2px;
      animation: scanMove 2s linear infinite;
    }

    @keyframes scanMove {
      0%   { top: 0; }
      100% { top: calc(100% - 3px); }
    }

    .scan-hint {
      position: absolute;
      bottom: 60px;
      left: 0; right: 0;
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      font-weight: 600;
    }

    /* Spinner */
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #d0ddf0;
      border-top-color: var(--azul);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .info-extra {
      width: 100%;
      max-width: 340px;
      background: #fff;
      border-radius: 16px;
      padding: 14px 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      display: none;
    }

    .info-extra.visivel { display: block; }

    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #555;
      padding: 5px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .info-row:last-child { border-bottom: none; }
    .info-row strong { color: #222; font-weight: 700; }
  </style>
</head>

<div class="scanner-overlay" id="scanner-overlay">
  <div class="scan-header">
    <span>Aponte para o QR Code</span>
    <button class="btn-fechar" onclick="fecharScanner()">✕</button>
  </div>
  <video id="video" autoplay playsinline muted></video>
  <div class="scan-frame-wrap">
    <div class="scan-frame">
      <div class="scan-line"></div>
    </div>
  </div>
  <div class="scan-hint">Centralize o QR Code no quadro verde</div>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
  const API = "https://script.google.com/macros/s/AKfycbxZzqIZj2998W65wfjpI151z_iNLWK_gvE72m02ved8-AoMjAa4HE3BkkxzmJ6LrHHc6Q/exec";

  let stream = null;
  let scanTimer = null;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  // Se abriu com ?token= na URL (QR lido por leitor nativo), processa direto
  const urlParams = new URLSearchParams(window.location.search);
  const tokenUrl  = urlParams.get("token");
  if (tokenUrl) {
    mostrarCarregando();
    consultarToken(tokenUrl);
  }

  function abrirScanner() {
    document.getElementById("scanner-overlay").classList.add("ativo");
    const video = document.getElementById("video");

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert("Câmera não suportada neste navegador.");
      fecharScanner();
      return;
    }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(s => {
        stream = s;
        video.srcObject = s;
        video.play();
        iniciarScan(video);
      })
      .catch(err => {
        alert("Não foi possível acessar a câmera: " + err.message);
        fecharScanner();
      });
  }

  function fecharScanner() {
    document.getElementById("scanner-overlay").classList.remove("ativo");
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
  }

  function iniciarScan(video) {
    scanTimer = setInterval(() => {
      if (video.readyState < video.HAVE_ENOUGH_DATA) return;
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
      if (code && code.data) {
        fecharScanner();
        processarQR(code.data);
      }
    }, 250);
  }

  function processarQR(texto) {
    // Aceita URL completa (ex: validar.html?token=XXXX) ou só o token
    let token = texto;
    try {
      const u = new URL(texto);
      token = u.searchParams.get("token") || texto;
    } catch(e) {
      // não é URL, usa como token direto
    }
    mostrarCarregando();
    consultarToken(token);
  }

  function consultarToken(token) {
    fetch(API + "?token=" + encodeURIComponent(token))
      .then(r => r.json())
      .then(data => {
        if (data.erro) {
          mostrarResultado(null, false, token);
        } else {
          mostrarResultado(data, data.status && data.status.toUpperCase() === "ATIVO");
        }
      })
      .catch(() => mostrarResultado(null, false, token, true));
  }

  function mostrarCarregando() {
    const card = document.getElementById("resultado-card");
    card.className = "resultado-card aguardando";
    document.getElementById("icon-wrap").className = "icon-status aguardando";
    document.getElementById("icon-wrap").innerHTML = `<div class="spinner"></div>`;
    document.getElementById("status-titulo").textContent = "Consultando...";
    esconder(["assoc-nome","assoc-meta","assoc-badge","timestamp","btn-nova"]);
    document.getElementById("info-extra").classList.remove("visivel");
  }

  function mostrarResultado(data, liberado, tokenFallback, erroRede) {
    const card   = document.getElementById("resultado-card");
    const agora  = new Date();
    const hora   = agora.toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"});
    const dataBr = agora.toLocaleDateString("pt-BR");

    if (erroRede) {
      card.className = "resultado-card negado";
      setIconNegado();
      document.getElementById("status-titulo").textContent = "Erro de conexão";
      document.getElementById("assoc-nome").textContent = "Verifique sua internet";
      mostrar(["assoc-nome"]);
      mostrar(["btn-nova"]);
      return;
    }

    if (liberado && data) {
      // LIBERADO
      card.className = "resultado-card liberado";
      setIconLiberado();
      document.getElementById("status-titulo").textContent = "DESCONTO LIBERADO";
      document.getElementById("assoc-nome").textContent = data.nome || "—";
      document.getElementById("assoc-meta").textContent = (data.tipo || "Associado");
      document.getElementById("assoc-badge").textContent = "✓ Anuidade em dia";
      document.getElementById("timestamp").textContent = "Verificado em " + dataBr + " às " + hora;

      document.getElementById("ie-id").textContent     = data.id || "—";
      document.getElementById("ie-tipo").textContent   = data.tipo || "—";
      document.getElementById("ie-status").textContent = data.status || "—";
      document.getElementById("ie-hora").textContent   = dataBr + " " + hora;

      mostrar(["assoc-nome","assoc-meta","assoc-badge","timestamp","btn-nova"]);
      document.getElementById("info-extra").classList.add("visivel");

    } else {
      // NEGADO
      card.className = "resultado-card negado";
      setIconNegado();
      document.getElementById("status-titulo").textContent = "ACESSO NEGADO";

      if (data) {
        document.getElementById("assoc-nome").textContent = data.nome || "—";
        document.getElementById("assoc-meta").textContent = data.tipo || "Associado";
        document.getElementById("assoc-badge").textContent = "✗ Anuidade vencida / inativo";

        document.getElementById("ie-id").textContent     = data.id || "—";
        document.getElementById("ie-tipo").textContent   = data.tipo || "—";
        document.getElementById("ie-status").textContent = data.status || "—";
        document.getElementById("ie-hora").textContent   = dataBr + " " + hora;
        document.getElementById("info-extra").classList.add("visivel");
      } else {
        document.getElementById("assoc-nome").textContent = "Token não encontrado";
        document.getElementById("assoc-meta").textContent = "Carteirinha inválida ou expirada";
        document.getElementById("assoc-badge").textContent = "✗ Não cadastrado";
      }

      document.getElementById("timestamp").textContent = "Verificado em " + dataBr + " às " + hora;
      mostrar(["assoc-nome","assoc-meta","assoc-badge","timestamp","btn-nova"]);
    }
  }

  function resetar() {
    const card = document.getElementById("resultado-card");
    card.className = "resultado-card aguardando";
    document.getElementById("icon-wrap").className = "icon-status aguardando";
    document.getElementById("icon-wrap").innerHTML = `
      <svg viewBox="0 0 34 34" fill="none" stroke="#6680aa" stroke-width="2.2">
        <rect x="5" y="5" width="10" height="10" rx="1.5"/>
        <rect x="19" y="5" width="10" height="10" rx="1.5"/>
        <rect x="5" y="19" width="10" height="10" rx="1.5"/>
        <path d="M19 19h4v4h-4zM23 19h6M19 23h4M23 23h6v6M29 19v4"/>
      </svg>`;
    document.getElementById("status-titulo").textContent = "Aguardando leitura";
    esconder(["assoc-nome","assoc-meta","assoc-badge","timestamp","btn-nova"]);
    document.getElementById("info-extra").classList.remove("visivel");
    // limpa url
    history.replaceState(null, "", window.location.pathname);
  }

  function setIconLiberado() {
    document.getElementById("icon-wrap").className = "icon-status liberado";
    document.getElementById("icon-wrap").innerHTML = `
      <svg viewBox="0 0 34 34" fill="none" stroke="#1a7a45" stroke-width="2.8">
        <path d="M6 18l8 8L28 8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
  }

  function setIconNegado() {
    document.getElementById("icon-wrap").className = "icon-status negado";
    document.getElementById("icon-wrap").innerHTML = `
      <svg viewBox="0 0 34 34" fill="none" stroke="#b03030" stroke-width="2.8">
        <path d="M8 8l18 18M26 8L8 26" stroke-linecap="round"/>
      </svg>`;
  }

  function mostrar(ids) { ids.forEach(id => { const el = document.getElementById(id); if(el) el.style.display = ""; }); }
  function esconder(ids) { ids.forEach(id => { const el = document.getElementById(id); if(el) el.style.display = "none"; }); }
</script>
</body>
</html>
