<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Validação</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #E3F2FD;
      color: #333;
    }

    .container {
      padding: 30px 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      max-width: 350px;
      margin: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .logo {
      width: 120px;
      margin-bottom: 15px;
    }

    .nome {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .tipo {
      font-size: 16px;
      margin-bottom: 15px;
      color: #666;
    }

    .status {
      font-size: 20px;
      font-weight: bold;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .ativo {
      background: #C8E6C9;
      color: #2E7D32;
    }

    .inativo {
      background: #FFCDD2;
      color: #C62828;
    }

    .erro {
      font-size: 22px;
      color: red;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card" id="app">

    <!-- TROCAR PELA SUA LOGO -->
    <img src="SUA_LOGO_AQUI" class="logo">

    <div class="nome" id="nome">Carregando...</div>
    <div class="tipo" id="tipo"></div>
    <div id="status" class="status"></div>

  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const token = params.get("token");

  const urlAPI = "https://script.google.com/macros/s/AKfycbyAyks1E4bjB2sFLGFwb6b5w3uMuj7GAE0xgZGGtyhQvPiVq4_VULqsBjq93q9DgB2GAw/exec";

  fetch(urlAPI + "?id=" + id + "&token=" + token)
    .then(res => res.json())
    .then(data => {

      if (data.erro) {
        document.getElementById("app").innerHTML = "<div class='erro'>❌ NÃO ENCONTRADO</div>";
        return;
      }

      document.getElementById("nome").innerText = data.nome;
      document.getElementById("tipo").innerText = data.tipo;

      const statusEl = document.getElementById("status");

      if (data.status === "ATIVO") {
        statusEl.innerText = "✅ ATIVO";
        statusEl.classList.add("ativo");
      } else {
        statusEl.innerText = "❌ INATIVO";
        statusEl.classList.add("inativo");
      }

    });
</script>

</body>
</html>
