<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Validação da Carteirinha</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #E3F2FD;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px 25px;
      max-width: 380px;
      margin: auto;
      box-shadow: 0 4px 25px rgba(0,0,0,0.15);
    }
    .logo {
      width: 110px;
      margin-bottom: 20px;
    }
    .nome {
      font-size: 26px;
      font-weight: bold;
      margin: 10px 0 5px;
    }
    .tipo {
      font-size: 17px;
      color: #666;
      margin-bottom: 20px;
    }
    .status {
      font-size: 22px;
      font-weight: bold;
      padding: 14px 30px;
      border-radius: 12px;
      margin: 20px 0;
    }
    .ativo { background: #C8E6C9; color: #2E7D32; }
    .inativo { background: #FFCDD2; color: #C62828; }
    .erro {
      font-size: 24px;
      color: #d32f2f;
      margin: 40px 0;
    }
    .loader {
      font-size: 18px;
      color: #666;
      margin: 30px 0;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card" id="app">
    <img src="SUA_LOGO_AQUI" class="logo" alt="Logo">
    <div class="loader" id="loading">Validando carteirinha...</div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  const urlAPI = "https://script.google.com/macros/s/AKfycbzrB_8BDCAjvIfrLNIrjx56tEN9gul1B1AKlCilI5r65PvCLPmFdn0hnOTImtGgXnu_cA/exec";

  if (!token) {
    document.getElementById("app").innerHTML = `<div class="erro">❌ QR Code inválido ou sem token</div>`;
    return;
  }

  fetch(urlAPI + "?token=" + encodeURIComponent(token))
    .then(res => res.json())
    .then(data => {
      document.getElementById("loading").style.display = "none";

      if (data.erro) {
        document.getElementById("app").innerHTML = `<div class="erro">❌ ${data.erro}</div>`;
        return;
      }

      // Sucesso - mostra os dados
      let html = `
        <img src="SUA_LOGO_AQUI" class="logo" alt="Logo">
        <div class="nome">${data.nome}</div>
        <div class="tipo">ID: ${data.id} • ${data.tipo}</div>
      `;

      if (data.status === "ATIVO") {
        html += `<div class="status ativo">✅ ASSOCIADO ATIVO</div>`;
      } else {
        html += `<div class="status inativo">❌ INATIVO</div>`;
      }

      document.getElementById("app").innerHTML = html;
    })
    .catch(err => {
      document.getElementById("loading").style.display = "none";
      document.getElementById("app").innerHTML = `<div class="erro">❌ Erro de conexão</div>`;
    });
</script>
</body>
</html>
