<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Validação PDD+</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 40px;
  background: linear-gradient(to bottom, #0a2540, #1e90ff);
  color: white;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 10px;
  max-width: 300px;
  margin: auto;
}

.ativo { color: green; font-weight: bold; }
.inativo { color: red; font-weight: bold; }
</style>
</head>

<body>

<h2>Validação PDD+</h2>

<div class="card" id="resultado">Carregando...</div>

<script>
const cores = {
  "Residente": "#1e90ff",
  "Comércio": "#ff8c00",
  "Prestador": "#2ecc71",
  "Condômino": "#8e44ad"
};

const id = new URLSearchParams(window.location.search).get("id");
const div = document.getElementById("resultado");

div.innerHTML = "Carregando...";

// chama direto com ID
const url = "https://script.google.com/macros/s/AKfycbxyQ6UfcVPqd-CEm90OTYGY0_htxqrp3OSsvGW5x9XVQGoDkBdCsijDxDymPQd3MWIfcA/exec?id=" + id;

fetch(url)
.then(res => res.json())
.then(s => {

  if (!s || !s.nome) {
    div.innerHTML = "<p class='inativo'>❌ Não encontrado</p>";
    return;
  }

  div.innerHTML = `
    <h2 style="color:${cores[s.tipo]}">${s.nome}</h2>
    <p><b>Tipo:</b> ${s.tipo}</p>
    <p class="${s.status=="ATIVO"?"ativo":"inativo"}">${s.status}</p>
    <p style="font-size:18px; font-weight:bold;">
      ${s.status=="ATIVO" ? "✅ AUTORIZADO" : "❌ NÃO AUTORIZADO"}
    </p>
  `;
})
.catch(() => {
  div.innerHTML = "<p class='inativo'>❌ Erro ao conectar com a base</p>";
});
</script>
</html>
