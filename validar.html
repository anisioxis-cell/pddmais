<script>
const token = new URLSearchParams(window.location.search).get("token");

fetch("https://script.google.com/macros/s/AKfycbw7qNgoVsEybKdUq1fdHFayLQKZmOfGHl6D2NTmfjkVpNkj6hN8KR16IiZoVeiJojDhNw/exec?token=" + token)
.then(r => r.json())
.then(dados => {

  if (dados.status === "ATIVO") {
    document.body.style.background = "#eafaf1";
    document.getElementById("conteudo").innerHTML = `
      <div class="status ok">✔ DESCONTO LIBERADO</div>
      <div class="nome">${dados.nome}</div>
      <div class="tipo">${dados.tipo}</div>
    `;
  } else {
    document.body.style.background = "#fdeeee";
    document.getElementById("conteudo").innerHTML = `
      <div class="status no">❌ SEM DIREITO A BENEFÍCIOS</div>
      <div class="nome">${dados.nome}</div>
      <div class="tipo">${dados.tipo}</div>
    `;
  }

});
</script>
