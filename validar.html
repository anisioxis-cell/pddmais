<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteirinha Digital - PDD+</title>
    <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .carteirinha {
            background: white;
            color: #333;
            width: 100%;
            max-width: 380px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            text-align: center;
        }
        .header {
            background: #1e3c72;
            color: white;
            padding: 18px;
            font-size: 1.35em;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .foto {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 6px solid #1e3c72;
            margin: 25px auto 15px;
            background: #ddd;
            background-size: cover;
            background-position: center;
        }
        .info {
            padding: 0 25px 30px;
        }
        .nome {
            font-size: 1.65em;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .detalhe {
            font-size: 1.1em;
            margin: 6px 0;
            color: #555;
        }
        .status {
            display: inline-block;
            padding: 10px 28px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.15em;
            margin: 18px 0 25px;
        }
        #qrcode {
            margin: 15px auto 25px;
            padding: 18px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.12);
        }
        .footer {
            font-size: 0.92em;
            color: #666;
            margin-top: 10px;
        }
        .btn {
            margin-top: 20px;
            padding: 14px 35px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.05em;
            cursor: pointer;
        }
        .loading {
            font-size: 18px;
            color: #666;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="carteirinha">
        <div class="header">CARTEIRINHA DIGITAL - PDD+</div>
        
        <div class="foto" id="foto"></div>
        
        <div class="info">
            <div class="nome" id="nome">Carregando...</div>
            <div class="detalhe" id="id"></div>
            <div class="detalhe" id="tipo"></div>
            
            <div class="status" id="status">ATIVO</div>
            
            <div id="qrcode"></div>
            
            <div class="footer">
                Apresente este QR Code ao comerciante parceiro<br>
                <strong>Validade:</strong> Enquanto o status estiver ATIVO
            </div>
            
            <button class="btn" onclick="window.location.reload()">Atualizar Carteirinha</button>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÕES ====================
        const apiUrl = "https://script.google.com/macros/s/AKfycbzrB_8BDCAjvIfrLNIrjx56tEN9gul1B1AKlCilI5r65PvCLPmFdn0hnOTImtGgXnu_cA/exec";
        
        // Pegar ID da URL (exemplo: index.html?id=RES-0001)
        const params = new URLSearchParams(window.location.search);
        let idAssociado = params.get("id");

        // Se não tiver ID na URL, usa o de teste
        if (!idAssociado) {
            idAssociado = "RES-0001";
            console.log("ID não informado. Usando RES-0001 para teste.");
        }

        // ==================== BUSCAR DADOS DA API ====================
        fetch(apiUrl + "?id=" + encodeURIComponent(idAssociado))
            .then(res => res.json())
            .then(data => {
                if (data.erro) {
                    document.getElementById("nome").textContent = "Erro";
                    document.getElementById("status").innerHTML = `❌ ${data.erro}`;
                    return;
                }

                // Preencher dados
                document.getElementById("nome").textContent = data.nome || "Nome não encontrado";
                document.getElementById("id").textContent = `ID: ${data.id || idAssociado}`;
                document.getElementById("tipo").textContent = `Tipo: ${data.tipo || ""}`;

                const statusEl = document.getElementById("status");
                statusEl.textContent = data.status || "INATIVO";
                statusEl.style.background = (data.status === "ATIVO") ? "#C8E6C9" : "#FFCDD2";
                statusEl.style.color = (data.status === "ATIVO") ? "#2E7D32" : "#C62828";

                // Gerar QR Code com o TOKEN
                gerarQRCode(data.token || data.id);
            })
            .catch(err => {
                document.getElementById("nome").textContent = "Erro de conexão";
                document.getElementById("status").innerHTML = "❌ Não foi possível carregar os dados";
                console.error(err);
            });

        // ==================== FUNÇÃO PARA GERAR QR CODE ====================
        function gerarQRCode(token) {
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; // limpa caso já tenha algo

            const qrCode = new QRCodeStyling({
                width: 260,
                height: 260,
                data: `validar.html?token=${token}`,   // ← Para teste local (mesma pasta)
                // data: `https://seusite.com/validar.html?token=${token}`,  // ← Quando subir para o servidor, use esta linha
                dotsOptions: { 
                    color: "#1e3c72", 
                    type: "rounded" 
                },
                backgroundOptions: { 
                    color: "#ffffff" 
                },
                imageOptions: { 
                    margin: 8 
                }
            });

            qrCode.append(qrContainer);
        }
    </script>
</body>
</html>
