<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demonstração</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f9ff; /* azul bem clarinho */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CARD */
.card {
  width: 92%;
  max-width: 420px;
  background: white;
  border-radius: 25px;
  padding: 30px 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  text-align: center;
}

/* TITULO */
h1 {
  font-size: 28px;
  color: #0077cc;
}

/* TEXTO GRANDE */
.nome {
  font-size: 26px;
  margin: 15px 0;
}

.tipo {
  font-size: 20px;
  color: #555;
}

/* STATUS */
.status {
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

.ok {
  color: #1e7e34;
}

.no {
  color: #c82333;
}

/* BOTÃO */
button {
  margin-top: 25px;
  padding: 15px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  background: #0077cc;
  color: white;
  width: 100%;
}
</style>
</head>

<body>

<div class="card">
  <h1>Validação</h1>

  <div id="conteudo">
    <p style="font-size:20px;">Aguardando leitura do QR Code</p>
  </div>

  <button onclick="simularLeitura()">📷 Simular leitura do QR Code</button>
</div>

<script>
function simularLeitura() {

  // DADO SIMULADO
  const dados = {
    nome: "Maria Oliveira",
    tipo: "Condômino",
    status: "ATIVO"
  };

  let classe = dados.status === "ATIVO" ? "ok" : "no";
  let texto = dados.status === "ATIVO" ? "✔ DESCONTO LIBERADO" : "❌ NÃO AUTORIZADO";

  document.getElementById("conteudo").innerHTML = `
    <div class="status no">❌ SEM DIREITO A BENEFÍCIOS</div>
<div class="nome">Maria Oliveira</div>
<div class="tipo">Condômino</div>
<div style="font-size:18px; margin-top:10px; color:#a00;">
  Associação inativa
</div>
  `;
}
</script>

</body>
</html>
