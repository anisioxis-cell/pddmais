<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Validação de Carteirinha</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #dbeeff, #f5faff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      width: 320px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #0077cc;
    }

    p {
      font-size: 18px;
      margin: 8px 0;
    }

    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 18px;
    }

    .ativo {
      background: #d4edda;
      color: #155724;
    }

    .inativo {
      background: #f8d7da;
      color: #721c24;
    }

    .loading {
      font-size: 18px;
      color: #555;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🔍 Validando...</h1>
  <div id="conteudo" class="loading">Carregando dados...</div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

fetch(`https://script.google.com/macros/s/SEU_SCRIPT_ID/exec?id=${id}`)
  .then(res => res.json())
  .then(dados => {
    if (dados.erro) {
      document.getElementById("conteudo").innerHTML = "❌ Não encontrado";
      return;
    }

    let statusClass = dados.status === "ATIVO" ? "ativo" : "inativo";

    document.querySelector("h1").innerText = "Carteirinha";
    document.getElementById("conteudo").innerHTML = `
      <p><strong>Nome:</strong> ${dados.nome}</p>
      <p><strong>Tipo:</strong> ${dados.tipo}</p>
      <div class="status ${statusClass}">
        ${dados.status}
      </div>
    `;
  })
  .catch(() => {
    document.getElementById("conteudo").innerHTML = "⚠️ Erro ao carregar";
  });
</script>

</body>
</html>
